<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donghua Library - Hanime AG</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.hero{
    text-align:center;
    padding:70px 20px;
    background:#1b1b1b;
}

.hero h1{
    color:#ff6a00;
    font-size:58px;
    margin-bottom:10px;
}

.hero p{
    color:#bdbdbd;
    font-size:26px;
}

.container{
    padding:40px;
}

.container h2{
    font-size:44px;
    margin-bottom:30px;
}

.genre-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.genre-card{
    background:#262626;
    border-radius:18px;
    padding:45px 20px;
    text-align:center;
    font-size:34px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.genre-card:hover{
    background:#ff6a00;
    transform:translateY(-6px);
}

</style>

</head>

<body>

<section class="hero">

<h1>Donghua Library</h1>

<p>Explore Chinese Animation</p>

</section>

<div class="container">

<h2>Genres</h2>

<div class="genre-grid">

<div class="genre-card">Cultivation</div>

<div class="genre-card">Martial Arts</div>

<div class="genre-card">Fantasy</div>

<div class="genre-card">Action</div>

<div class="genre-card">Adventure</div>

<div class="genre-card">Romance</div>

<div class="genre-card">Historical</div>

<div class="genre-card">Modern</div>

<div class="genre-card">Comedy</div>

<div class="genre-card">Sci-Fi</div>

<div class="genre-card">Mythology</div>

<div class="genre-card">Supernatural</div>

</div>

</div>

</body>
</html>
