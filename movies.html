<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - Hanime AG</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header class="topbar">

    <a href="index.html" class="menu-btn">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search movies...">
    </div>

    <a href="account.html" class="profile-btn">
        <i class="fas fa-user-circle"></i>
    </a>

</header>

<main class="page-content">

    <h1>Movies</h1>

    <h2>Genres</h2>

    <div class="genre-list">
        <a href="#">Action</a>
        <a href="#">Adventure</a>
        <a href="#">Fantasy</a>
        <a href="#">Sci-Fi</a>
        <a href="#">Romance</a>
        <a href="#">Comedy</a>
        <a href="#">Drama</a>
        <a href="#">Horror</a>
        <a href="#">Mystery</a>
        <a href="#">Supernatural</a>
        <a href="#">Family</a>
        <a href="#">Award Winning</a>
    </div>

    <h2>Featured Movies</h2>

    <div class="movie-grid">

        <div class="movie-card">
            <img src="https://picsum.photos/300/450?1" alt="Movie One">
            <h3>Movie One</h3>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/450?2" alt="Movie Two">
            <h3>Movie Two</h3>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/450?3" alt="Movie Three">
            <h3>Movie Three</h3>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/450?4" alt="Movie Four">
            <h3>Movie Four</h3>
        </div>

    </div>

</main>

</body>
</html>
