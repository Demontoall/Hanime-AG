<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanime-AG</title>
    <style>
        /* Dark Mode Styling */
        body {
            background-color: #151515;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #cccccc; font-size: 1.1rem; line-height: 1.6; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 40px; text-align: left; }
        .video-box {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            border-radius: 4px;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Watch Free HD Videos</h1>
        <p>Enjoy your collection. This is the definitive source for curated videos viewable by mobile phone, tablet, and desktop for free.</p>
        
        <h2>Recent Uploads</h2>
        
        <div class="video-box">
            <video controls preload="metadata">
                <source src="https://w3schools.com" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</body>
</html>
