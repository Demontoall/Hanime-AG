<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanime-AG Player</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 960px;
            background-color: #1f2833;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            margin: 20px;
        }
        .player-header {
            padding: 15px 20px;
            background-color: #151a21;
            border-bottom: 2px solid #45f3ff;
        }
        .player-header h1 {
            margin: 0;
            font-size: 1.3rem;
            color: #45f3ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        video {
            width: 100%;
            display: block;
            background-color: #000000;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-header">
            <h1>Now Streaming: Dance Showcase</h1>
        </div>
        
        <!-- Standard Streaming Video Player HTML5 Element -->
        <video controls preload="metadata" poster="https://cloudinary.com">
            <source src="https://cloudinary.com" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

</body>
</html>
