<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanime-AG</title>
    <style>
        /* Dark Mode Styling */
        body {
            background-color: #151515;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Hero Text Container */
        .hero {
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .hero p {
            color: #aaaaaa;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 40px auto 20px auto;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .section-title {
            font-size: 22px;
            text-align: left;
        }

        /* Responsive Grid for Content Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Individual Content Card */
        .card {
            background-color: #202020;
            border-radius: 4px;
            overflow: hidden;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .card-info {
            padding: 12px;
        }
        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 8px 0;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- Top Text Section -->
    <div class="hero">
        <h1>Watch Free HD Videos</h1>
        <p>Enjoy your collection. This is the definitive source for curated videos viewable by mobile phone, tablet, and desktop for free.</p>
    </div>

    <!-- Section Heading -->
    <div class="section-header">
        <div class="section-title">Recent Uploads</div>
    </div>

    <!-- Media Grid Layout -->
    <div class="grid">
        <!-- Card 1 -->
        <div class="card">
            <img src="https://placeholder.com" alt="Cover Art">
            <div class="card-info">
                <div class="card-title">Title Entry 1</div>
            </div>
        </div>
        <!-- Card 2 -->
        <div class="card">
            <img src="https://placeholder.com" alt="Cover Art">
            <div class="card-info">
                <div class="card-title">Title Entry 2</div>
            </div>
        </div>
    </div>

</body>
</html>
